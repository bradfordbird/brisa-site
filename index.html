    transform:scale(1.06); animation:settle 7s cubic-bezier(.16,.68,.32,1) forwards;
  }
  @keyframes settle{ to{ transform:scale(1); } }

  .scrim{
    position:absolute; inset:0; z-index:1; pointer-events:none;
    background:
      radial-gradient(58% 46% at 50% 44%, rgba(9,22,28,.42), rgba(9,22,28,0) 72%),
      linear-gradient(180deg, rgba(12,31,38,.52) 0%, rgba(12,31,38,.10) 26%, rgba(12,31,38,.10) 58%, rgba(9,22,28,.72) 100%);
  }

  .content{
    position:relative; z-index:2; flex:1 1 auto;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    padding:clamp(2rem,6vw,4rem); gap:clamp(1.4rem,3.2vw,2.2rem);
  }
  .eyebrow{
    margin:0; font-weight:300; font-size:clamp(.66rem,.6rem+.2vw,.76rem);
    letter-spacing:.44em; text-transform:uppercase; color:rgba(245,239,227,.86); text-indent:.44em;
  }
  .logo-wrap{ line-height:0; }
  svg.logo{
    width:clamp(210px,40vw,352px); height:auto; display:block;
    filter:drop-shadow(0 3px 26px rgba(8,20,25,.5)); will-change:transform;
  }
  .lede{
    margin:0; max-width:33rem;
    font-family:"Cormorant Garamond",Georgia,serif; font-weight:500;
    font-size:clamp(1.18rem,1rem+1.1vw,1.62rem); line-height:1.55; letter-spacing:.006em;
    color:var(--cream); text-wrap:balance; text-shadow:0 1px 14px rgba(8,20,25,.45);
  }
  .foot{
    position:absolute; left:0; right:0; bottom:0; z-index:2;
    display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:.9em;
    padding:0 1.5rem clamp(1.4rem,3.5vw,2.4rem);
    font-weight:300; font-size:clamp(.62rem,.58rem+.2vw,.7rem);
    letter-spacing:.2em; text-transform:uppercase; color:rgba(245,239,227,.8);
  }
  .foot a{ color:inherit; text-decoration:none; padding-bottom:2px;
    border-bottom:1px solid rgba(245,239,227,.28); transition:border-color .3s ease, color .3s ease; }
  .foot a:hover{ color:var(--cream); border-color:var(--cream); }
  .foot a:focus-visible{ outline:2px solid var(--cream); outline-offset:4px; border-radius:1px; }
  .foot .dot{ opacity:.5 }

  /* Entrance (pure CSS, autoplays, no JS needed) */
  .eyebrow,.logo-wrap,.lede,.foot{ opacity:0; animation:rise 1s cubic-bezier(.16,.68,.32,1) forwards; }
  .eyebrow{ animation-delay:.2s } .logo-wrap{ animation-delay:.4s }
  .lede{ animation-delay:.65s } .foot{ animation-delay:.95s }
  @keyframes rise{ from{ opacity:0; transform:translateY(16px) } to{ opacity:1; transform:none } }

  /* Gentle breeze on the mark */
  svg.logo{ animation:breeze 9s ease-in-out 2s infinite; }
  @keyframes breeze{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-4px) } }

  @media (prefers-reduced-motion: reduce){
    .photo{ transform:none; animation:none; }
    .eyebrow,.logo-wrap,.lede,.foot{ opacity:1; animation:none; }
    svg.logo{ animation:none; }
    *{ transition:none !important; }
  }
</style>
</head>

  <main class="stage">
    <div class="photo" aria-hidden="true"></div>
    <div class="scrim" aria-hidden="true"></div>
    <div class="content">
